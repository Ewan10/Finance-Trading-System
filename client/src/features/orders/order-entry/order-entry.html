<div class="form-container">
    <fieldset class="form-fieldset">

    <legend class="form-title">
        Order Entry Panel
    </legend>

    <form class="form" (ngSubmit)="submitOrder()">
        <div class="form-group">
            <label class="form-label" for="clientId">ClientId</label>
            <input class="form-input" id="clientId"
             name="clientId"
             type="number"
             [(ngModel)]="order.clientId">
        </div>

        <div class="form-group">
            <label class="form-label" for="price">Price</label>
            <input class="form-input" id="price" step="0.01" name="price"
            type="number" [(ngModel)]="order.price">
        </div>

        <div class="form-group">
            <label class="form-label" for="quantity">Quantity</label>
            <input class="form-input" id="quantity" step="1" name="quantity"
            type="number" [(ngModel)]="order.quantity">
        </div>

        <div class="form-group">
            <label class="form-label" for="side">Side</label>
            <select class="form-select" name="side" id="side" [(ngModel)]="order.side">
                <option value="BUY">Buy</option>
                <option value="SELL">Sell</option>
            </select>
        </div>

        <div class="actions">
            <button class="order-btn" type="submit">Submit Order</button>
        </div>
    </form>
    </fieldset>
</div>
