<div class="form-container">
    <fieldset class="form-fieldset">

    <legend class="form-title">
        Order Entry Panel
    </legend>

    <form class="form">
        <div class="form-group">
            <label class="form-label" for="clientId">ClientId</label>
            <input class="form-input" id="clientId" name="clientId" type="number">
        </div>

        <div class="form-group">
            <label class="form-label" for="price">Price</label>
            <input class="form-input" id="price" step="0.1" name="price" type="number">
        </div>

        <div class="form-group">
            <label class="form-label" for="quantity">Quantity</label>
            <input class="form-input" id="quantity" step="1" name="quantity" type="number">
        </div>

        <div class="form-group">
            <label class="form-label" for="side">Side</label>
            <select class="form-select" name="side" id="side">
                <option value="BUY">Buy</option>
                <option value="SELL">Sell</option>
            </select>
        </div>

        <div class="actions">
            <button class="order-btn" type="submit">Submit Order</button>
        </div>
    </form>
    </fieldset>
</div>
